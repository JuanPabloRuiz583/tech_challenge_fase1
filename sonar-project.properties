# SonarCloud Configuration
sonar.projectKey=gestao-api-phase1
sonar.organization=wesley-estudos

# Project
sonar.projectName=Gest„o API - Tech Challenge Fase 1  
sonar.projectVersion=0.0.1-SNAPSHOT
sonar.projectDescription=Sistema de gest„o de usu·rios para restaurantes

# Source code
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.sourceEncoding=UTF-8
sonar.java.source=17
sonar.java.target=17

# Binaries
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Exclusions (only files that don't need testing)
sonar.exclusions=\
  **/dto/**,\
  **/jwt/Credentials.java,\
  **/Application.java

# Coverage exclusions (files that don't need test coverage)
sonar.coverage.exclusions=\
  **/dto/**,\
  **/jwt/Credentials.java,\
  **/Application.java,\
  **/exception/**,\
  **/config/SecurityConfig.java,\
  **/config/SwaggerConfig.java

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports
sonar.java.coveragePlugin=jacoco

# Code quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Issues
sonar.issue.ignore.multiline.block=true

# Logging
sonar.verbose=false

