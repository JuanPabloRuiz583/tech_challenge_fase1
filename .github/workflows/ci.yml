name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/**", "hotfix/**", "bugfix/**", "chore/**", "refactor/**" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Make mvnw executable
      run: chmod +x ./mvnw

    - name: Build and test with Maven
      run: ./mvnw clean verify -B

    - name: Upload JaCoCo coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: target/site/jacoco/
        retention-days: 30

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 30

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Make mvnw executable
      run: chmod +x ./mvnw

    - name: Build with coverage
      run: ./mvnw clean verify -B

    - name: SonarCloud Scan
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./mvnw sonar:sonar
        -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
        -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
        -Dsonar.host.url=https://sonarcloud.io
        -B

  create-pr:
    name: Create/Update PR
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/heads/feature/') ||
      startsWith(github.ref, 'refs/heads/hotfix/') ||
      startsWith(github.ref, 'refs/heads/bugfix/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Pull Request
      uses: repo-sync/pull-request@v2
      with:
        source_branch: ${{ github.ref_name }}
        destination_branch: develop
        pr_title: "🤖 Auto-PR: ${{ github.ref_name }}"
        pr_body: |
          ## 🤖 Automated Pull Request
          
          **Branch:** `${{ github.ref_name }}`
          **Build Status:** ✅ Passed
          
          This PR was automatically created by the CI pipeline.
          
          ### Checklist
          - [ ] Code review completed
          - [ ] Tests pass
          - [ ] SonarCloud quality gate passes
          - [ ] Documentation updated (if needed)
          
          ---
          *Generated by GitHub Actions*
        pr_label: "ci/auto-pr,status/ready-for-review"
        github_token: ${{ secrets.GITHUB_TOKEN }}

