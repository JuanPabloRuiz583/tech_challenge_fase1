name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/**", "hotfix/**", "bugfix/**", "chore/**", "refactor/**" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Make mvnw executable
      run: chmod +x ./mvnw

    - name: Build and test with Maven
      run: ./mvnw clean verify -B

    - name: Upload JaCoCo coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: target/site/jacoco/
        retention-days: 30

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 30

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Make mvnw executable
      run: chmod +x ./mvnw

    - name: Build with coverage
      run: ./mvnw clean verify -B

    - name: SonarCloud Scan
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./mvnw sonar:sonar
        -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
        -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
        -Dsonar.host.url=https://sonarcloud.io
        -B

  create-pr:
    name: Create/Update PR
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pull-requests: write
    if: |
      startsWith(github.ref, 'refs/heads/feature/') ||
      startsWith(github.ref, 'refs/heads/hotfix/') ||
      startsWith(github.ref, 'refs/heads/bugfix/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Create Pull Request with GitHub CLI
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Configure git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check if develop branch exists, if not create it from main
        if ! git show-ref --verify --quiet refs/heads/develop; then
          echo "Creating develop branch from main..."
          git checkout -b develop
          git push origin develop
          git checkout ${{ github.ref_name }}
        fi
        
        # Check if PR already exists
        existing_pr=$(gh pr list --head "${{ github.ref_name }}" --base develop --json number --jq '.[0].number // empty')
        
        if [ -z "$existing_pr" ]; then
          echo "Creating new PR..."
          gh pr create \
            --title "🤖 Auto-PR: ${{ github.ref_name }}" \
            --body "## 🤖 Automated Pull Request

        **Branch:** \`${{ github.ref_name }}\`
        **Build Status:** ✅ Passed
        
        This PR was automatically created by the CI pipeline.
        
        ### Checklist
        - [ ] Code review completed
        - [ ] Tests pass
        - [ ] SonarCloud quality gate passes
        - [ ] Documentation updated (if needed)
        
        ---
        *Generated by GitHub Actions*" \
            --base develop \
            --head "${{ github.ref_name }}" \
            --label "ci/auto-pr" \
            --label "status/ready-for-review"
          
          echo "✅ PR created successfully!"
        else
          echo "ℹ️  PR #$existing_pr already exists for branch ${{ github.ref_name }}"
        fi

