name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/**", "hotfix/**", "bugfix/**", "chore/**", "refactor/**" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and test with Maven
      run: ./mvnw clean verify -B

    - name: Upload JaCoCo coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: target/site/jacoco/
        retention-days: 30

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 30

  name: SonarQube
  on:
    push:
    branches:
      - master
    pull_request:
      types: [opened, synchronize, reopened]
  jobs:
    build:
      name: Build and analyze
      runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=wandrad3profile-projects_tech-challenge-fase1

  create-pr:
    name: Create/Update PR
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/heads/feature/') ||
      startsWith(github.ref, 'refs/heads/hotfix/') ||
      startsWith(github.ref, 'refs/heads/bugfix/')
    
    steps:
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "ci: auto-generated PR from ${{ github.ref_name }}"
        title: "🤖 Auto-PR: ${{ github.ref_name }}"
        body: |
          ## 🤖 Automated Pull Request
          
          **Branch:** `${{ github.ref_name }}`
          **Build Status:** ✅ Passed
          
          This PR was automatically created by the CI pipeline.
          
          ### Checklist
          - [ ] Code review completed
          - [ ] Tests pass
          - [ ] SonarCloud quality gate passes
          - [ ] Documentation updated (if needed)
          
          ---
          *Generated by GitHub Actions*
        branch: ${{ github.ref_name }}
        base: develop
        delete-branch: false
        labels: "ci/auto-pr, status/ready-for-review"

